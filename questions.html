<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CUSTOM META TAGS -->
    <meta name="author" content="Creative Mindset" />
    <meta
      name="description"
      content="Dive into thousands of fun, bite-sized quizzes. Whether you have five minutes to kill or want to challenge your friends to a showdown, BrainBuzz is your go-to hub for brain-teasing fun."
    />

    <!-- FAVICON -->
    <link rel="icon" href="./assets/imgs/favicon.png" />

    <!-- CSS LINKING -->
    <link rel="stylesheet" href="./css/styles.css" />

    <!-- TITLE -->
    <title>BrainBuzz</title>
  </head>
  <body>
    <div class="container question-container">
      <div class="ques-container flex">
        <div class="questions flex">
          <h2 id="question-number"></h2>
          <p id="question"></p>
          <div class="line"></div>
        </div>

        <ul class="choices" id="choices">
          <li>
            <span class="letters">A</span>
            <span class="answers">Gauze grievance disorder</span>
          </li>

          <li>
            <span class="letters">B</span>
            <span class="answers">Gauze grievance disorder</span>
          </li>

          <li>
            <span class="letters">C</span>
            <span class="answers">Gauze grievance disorder</span>
          </li>

          <li>
            <span class="letters">D</span>
            <span class="answers">Gauze grievance disorder</span>
          </li>
        </ul>

        <button class="next-btn" id="next-btn">Next</button>

        <div class="modal">
          <p class="modal-text">Please select an answer before moving on</p>
        </div>
      </div>
    </div>

    <script src="./js/questions.js"></script>
  </body>
</html>
